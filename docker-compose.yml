# Carga variables desde .env en la raíz del repo (copiar desde .env.example).
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-gallery-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8082"
      SERVER_ADDRESS: "0.0.0.0"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://pet-gallery.alejandrotech.eu}
      DOG_API_KEY: ${DOG_API_KEY:-}
      CAT_API_KEY: ${CAT_API_KEY:-}
    ports:
      - "127.0.0.1:8082:8082"
